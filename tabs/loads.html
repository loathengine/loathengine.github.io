            <div class="card">
                <h3>Manage Load Data</h3>
                <div class="form-grid" style="margin-bottom: 1rem;">
                    <label class="checkbox-container" style="display: flex; align-items: center; justify-content: flex-start; cursor: pointer; padding: 0.5rem; background: #1f2937; border-radius: 0.375rem; border: 1px solid #374151; width: fit-content;">
                        <input type="checkbox" id="loadIsCommercialCheckbox" style="margin-right: 0.5rem;">
                        <span style="font-weight: 600; color: #d1d5db;">This is a Commercial Load</span>
                    </label>
                </div>

                <div id="load-forms-container">
                    <form id="loadForm">
                        <input type="hidden" id="loadId">
                        
                        <div class="form-grid" style="margin-bottom: 1rem;">
                            <div><label for="loadDiameter">Diameter</label><select id="loadDiameter"></select></div>
                            <div><label for="loadCartridge">Cartridge</label><select id="loadCartridge"></select></div>
                        </div>

                        <!-- Commercial fields -->
                        <div id="commercialNameContainer" class="form-grid" style="display: none; margin-bottom: 1rem;">
                            <div><label for="loadCommercialManufacturer">Manufacturer</label><select id="loadCommercialManufacturer"></select></div>
                            <div><label for="loadCommercialName">Commercial Ammo Name</label><input type="text" id="loadCommercialName" placeholder="e.g. Hornady Match"></div>
                            <div><label for="loadCommercialPart">Part #</label><input type="text" id="loadCommercialPart"></div>
                        </div>
                        
                        <div class="form-grid" style="margin-bottom: 1rem;">
                            <!-- Handload primarily filters by weight first, commercial just picks from all bullets in diameter -->
                            <div id="bulletWeightContainer"><label for="loadBulletWeight">Bullet Weight</label><select id="loadBulletWeight"></select></div>
                            <div id="bulletNameContainer"><label for="loadBullet">Bullet (Manuf./Name)</label><select id="loadBullet"></select></div>
                            <div><label for="loadBulletLot">Bullet / Ammo Lot</label><input type="text" id="loadBulletLot"></div>
                        </div>

                        <!-- HANDLOAD ONLY FIELDS -->
                        <div id="handloadOnlySections">
                            <div class="form-grid" style="margin-bottom: 1rem;">
                                <div><label for="loadHandloadName">Load Nickname</label><input type="text" id="loadHandloadName" placeholder="e.g. 6.5 CM Match"></div>
                            </div>
                            <div class="form-grid" style="margin-bottom: 1rem;">
                                <div><label for="loadPowderManufacturer">Powder Manufacturer</label><select id="loadPowderManufacturer"></select></div>
                                <div><label for="loadPowder">Powder</label><select id="loadPowder"></select></div>
                                <div><label for="loadChargeWeight">Charge (gr)</label><input type="number" step="0.1" id="loadChargeWeight" inputmode="decimal"></div>
                                <div><label for="loadPowderLot">Powder Lot</label><input type="text" id="loadPowderLot"></div>
                            </div>
                            <div class="form-grid" style="margin-bottom: 1rem;">
                                <div><label for="loadPrimer">Primer</label><select id="loadPrimer"></select></div>
                                <div><label for="loadPrimerLot">Primer Lot</label><input type="text" id="loadPrimerLot"></div>
                                <div><label for="loadCol">COAL (in)</label><input type="number" step="0.001" id="loadCol" inputmode="decimal"></div>
                            </div>

                            <div class="form-grid" style="margin-bottom: 1rem;">
                                <div><label for="loadBrass">Brass Manufacturer</label><select id="loadBrass"></select></div>
                                <div><label for="loadBrassLot">Brass Lot</label><input type="text" id="loadBrassLot"></div>
                                <div><label for="loadFirings"># of Firings</label><input type="number" step="1" id="loadFirings" inputmode="numeric"></div>
                            </div>

                            <h4 style="margin-top: 1rem; border-bottom: 1px solid #4b5563; padding-bottom: 0.5rem;">Precision Measurements</h4>
                            <div class="form-grid" style="margin-bottom: 1rem;">
                                <div><label for="loadCbto">CBTO (in)</label><input type="number" step="0.001" id="loadCbto" inputmode="decimal"></div>
                                <div><label for="loadCbtoComp">CBTO Comparator</label><input type="text" id="loadCbtoComp" placeholder="e.g. Hornady .30"></div>
                                <div><label for="loadShoulder">Shoulder Pos (in)</label><input type="number" step="0.001" id="loadShoulder" inputmode="decimal"></div>
                                <div><label for="loadShoulderComp">Shoulder Comparator</label><input type="text" id="loadShoulderComp" placeholder="e.g. .400 B"></div>
                            </div>
                        </div>
                    </form>
                    <div class="flex-container" style="margin-top: 1rem; max-width: 400px;">
                        <button type="submit" form="loadForm" class="btn-blue">Save Load Data</button>
                        <button type="reset" form="loadForm" class="btn-gray">Clear Form</button>
                    </div>
                </div>

                <div style="border: 1px solid #374151; border-radius: 0.5rem; background-color: #1f2937; margin-top: 2rem;">
                    <div id="load-filters" style="padding: 1rem; border-bottom: 1px solid #374151; background-color: #2a374a; border-radius: 0.5rem 0.5rem 0 0;">
                        <h4 style="margin-top: 0; margin-bottom: 0.5rem; font-size: 0.875rem; color: #9ca3af;">Data Table Filters</h4>
                        <div class="form-grid">
                            <div style="grid-column: 1 / -1; display: flex; gap: 1.5rem; margin-bottom: 0.5rem; align-items: center; border-bottom: 1px solid #374151; padding-bottom: 1rem;">
                                <label class="checkbox-container" style="display: flex; align-items: center;"><input type="radio" name="loadFilterType" value="all" id="filterShowAll" checked style="margin-right:0.4rem;"> Show All Loads</label>
                                <label class="checkbox-container" style="display: flex; align-items: center;"><input type="radio" name="loadFilterType" value="handload" id="filterShowHandloads" style="margin-right:0.4rem;"> Hand Loads Only</label>
                                <label class="checkbox-container" style="display: flex; align-items: center;"><input type="radio" name="loadFilterType" value="commercial" id="filterShowCommercial" style="margin-right:0.4rem;"> Commercial Loads Only</label>
                            </div>
                            <div>
                                <label for="filterCartridge">Cartridge</label>
                                <select id="filterCartridge"><option value="">All</option></select>
                            </div>
                            <div>
                                <label for="filterBullet">Bullet</label>
                                <select id="filterBullet"><option value="">All</option></select>
                            </div>
                            <div>
                                <label for="filterPowder">Powder</label>
                                <select id="filterPowder"><option value="">All</option></select>
                            </div>
                            <div style="display: flex; align-items: flex-end;">
                                <button type="button" id="clearFilters" class="btn-gray btn-small" style="width: 100%; margin-bottom: 0.2rem;">Clear Filters</button>
                            </div>
                        </div>
                    </div>

                    <div class="data-table-container" style="margin-top: 0; border: none; border-radius: 0 0 0.5rem 0.5rem;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Cartridge</th>
                                    <th>Bullet</th>
                                    <th>Powder</th>
                                    <th>Charge</th>
                                    <th>COAL</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="loadsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
