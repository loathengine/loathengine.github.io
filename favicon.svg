<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" />
  
  <!-- Horizontal Baseline -->
  <line x1="80" y1="360" x2="432" y2="360" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  
  <!-- Tick Marks -->
  <!-- Left side ticks -->
  <line x1="110" y1="360" x2="110" y2="370" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <line x1="140" y1="360" x2="140" y2="366" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <line x1="170" y1="360" x2="170" y2="370" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <line x1="200" y1="360" x2="200" y2="366" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <line x1="230" y1="360" x2="230" y2="370" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  
  <!-- Right side ticks -->
  <line x1="282" y1="360" x2="282" y2="370" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <line x1="312" y1="360" x2="312" y2="366" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <line x1="342" y1="360" x2="342" y2="370" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <line x1="372" y1="360" x2="372" y2="366" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <line x1="402" y1="360" x2="402" y2="370" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  
  <!-- Bell Curve Path -->
  <path d="M 80,360 C 180,360 210,120 256,120 C 302,120 332,360 432,360" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="8" 
        stroke-linecap="round" />
        
  <!-- Vertical Dashed Axis of Symmetry -->
  <line x1="256" y1="100" x2="256" y2="360" 
        stroke="#ffffff" 
        stroke-width="3" 
        stroke-dasharray="10, 10" 
        opacity="0.8" />
        
  <!-- Target Dot/Circle at Bottom Center -->
  <!-- White outer circle -->
  <circle cx="256" cy="360" r="22" fill="#ffffff" />
  <!-- Blue inner circle -->
  <circle cx="256" cy="360" r="14" fill="#2563eb" />
</svg>