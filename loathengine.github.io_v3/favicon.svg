<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="gradInner" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Rings -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#gradOuter)" stroke-width="24" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="#3b82f6" stroke-width="6" opacity="0.4" />
  <circle cx="256" cy="256" r="90" fill="none" stroke="#60a5fa" stroke-width="4" opacity="0.3" stroke-dasharray="12 12" />
  
  <!-- Crosshairs -->
  <!-- Top -->
  <line x1="256" y1="26" x2="256" y2="130" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" />
  <!-- Bottom -->
  <line x1="256" y1="382" x2="256" y2="486" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" />
  <!-- Left -->
  <line x1="26" y1="256" x2="130" y2="256" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" />
  <!-- Right -->
  <line x1="382" y1="256" x2="486" y2="256" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" />
  
  <!-- Central grouping representing statistical precision -->
  <circle cx="256" cy="256" r="22" fill="#3b82f6" filter="url(#glow)" />
  <circle cx="236" cy="242" r="14" fill="#93c5fd" opacity="0.85" />
  <circle cx="272" cy="268" r="16" fill="#1d4ed8" opacity="0.9" />
  <circle cx="264" cy="232" r="10" fill="#60a5fa" opacity="0.75" />
</svg>